    function goBack(){if(state.step>1)go(state.step-1,'back');else if(state.search){state.search=false;state.query='';state.selected=null;render()} }
    function render1(){
      let body;if(!state.search)body=`<div class="content" style="padding-bottom:32px"><div class="hero"><div class="hero-icon">${icons.key}</div><h2>Registro de llaves</h2><p>Identifica la propiedad para comenzar</p></div><div class="stack"><button class="soft-btn" onclick="openQR()">${icons.qr} Escanear código</button><button class="outline" onclick="manualSheet()">Ingresar código manualmente</button><button class="outline" onclick="openSearch()">${icons.search} Buscar propiedad</button></div></div>`;
      else{const q=state.query.toLowerCase().trim(),filtered=q.length>1?results.filter(r=>(r.building+' '+r.address+' '+r.tenant).toLowerCase().includes(q)):[];body=`<div class="content"><div class="searchbox"><span class="search-prefix">${icons.search}</span><input id="search" value="${escapeHtml(state.query)}" placeholder="Ej: Juan Pérez o Jorge Washington 520" oninput="searchInput(this.value)"></div><div>${filtered.map(resultCard).join('')}${q.length>1&&!filtered.length?`<p class="empty">Sin resultados para “${escapeHtml(state.query)}”</p>`:''}</div></div>`}
      app.innerHTML=shell(body,{step:1,back:state.search,footer:state.search?footer('Continuar','go(2)',state.selected!==null):''});if(state.search){const el=document.getElementById('search');el.focus();el.setSelectionRange(el.value.length,el.value.length)}}
    function resultCard(r){return `<button class="result ${state.selected===r.id?'selected':''}" onclick="selectResult(${r.id})">${icons.pin}<span class="result-main"><h2>${r.building}</h2><p>${r.address}</p><small>${r.tenant} · ${r.rut}</small><span class="badge-combo"><span>${r.type}</span><i></i><span>${r.op}</span></span></span></button>`}
    function openSearch(){state.search=true;state.query='';state.selected=null;render()}function searchInput(v){state.query=v;state.selected=null;render()}function selectResult(id){state.selected=state.selected===id?null:id;render()}
    function render2(){const countItems=[['depto','Llaves departamento','De la entrada, habitaciones, baños o clósets'],['bodega','Llaves bodega','Abren la bodega'],['tarjeta','Tarjeta magnética',''],['control','Control remoto','']];const body=`<div class="content" style="padding-top:20px"><section class="section"><span class="label">Propiedad</span><div class="card info-row">${icons.pin}<div><p class="strong">Jorge Washington 520, Depto 307</p><p class="secondary">Ñuñoa, Región Metropolitana</p><span class="badge-combo"><span>Rotación</span><i></i><span>VCTEB92</span></span></div></div></section><section class="section"><span class="label">Arrendatario</span><div class="card info-row">${icons.user}<div><p class="strong">Camila Torres</p><p class="secondary">12.345.678-9</p><p class="secondary">camila.torres@gmail.com</p><p class="secondary">+56 9 8765 4321</p></div></div></section><section class="section"><span class="label">Entregado por</span>${deliveryChoice('titular','Titular','El arrendatario hace la entrega')}${deliveryChoice('tercero','Tercero o mandatario','Otra persona entrega en su nombre')}<div class="fields ${state.delivered==='tercero'?'show':''}"><label class="secondary">Nombre completo *<input class="input" placeholder="Ej: María González"></label><label class="secondary">RUT *<input class="input" placeholder="Ej: 12.345.678-9"></label></div></section><section class="section"><span class="label">Fecha de entrega de llaves</span><div class="card info-row" style="align-items:center">${icons.calendar}<span class="strong" style="flex:1">26 de junio de 2026</span><span class="badge-combo" style="margin:0">Hoy</span></div></section><section class="counter-card"><div class="counter-head"><p class="strong">Llaves y accesos recibidos</p><p class="secondary" style="color:#6b7280;margin-top:4px">Cantidad que recibes del arrendatario</p></div>${countItems.map(([k,l,d])=>`<div class="counter-row"><div class="counter-copy"><p>${l}</p>${d?`<small>${d}</small>`:''}</div><div class="counter"><button onclick="changeCount('${k}',-1)" ${state.counts[k]===0?'disabled':''}>−</button><span>${state.counts[k]}</span><button onclick="changeCount('${k}',1)">+</button></div></div>`).join('')}</section></div>`;app.innerHTML=shell(body,{step:2,footer:footer('Confirmar y continuar','go(3)')})}
    function deliveryChoice(id,title,sub){return `<button class="choice ${state.delivered===id?'selected':''}" onclick="state.delivered='${id}';render()"><span class="radio"></span><span><b class="strong">${title}</b><span class="secondary">${sub}</span></span></button>`}function changeCount(k,d){state.counts[k]=Math.max(0,state.counts[k]+d);render()}
    function render3(){const has=state.photos.length>0;const body=`<div class="content">${!has?`<div class="evidence-empty"><div class="camera">${icons.camera}</div><h2>Fotografía las llaves recibidas</h2><p>Esta foto quedará como evidencia del estado y cantidad de llaves al momento de la entrega</p><button class="outline" onclick="addPhoto()">${icons.camera} Tomar foto</button></div>`:`<div class="photo-grid">${state.photos.map((t,i)=>`<div class="photo"><div class="photo-art"></div><div class="key-shape"></div><span class="photo-time">${t}</span><button class="trash" onclick="removePhoto(${i})" aria-label="Eliminar foto">×</button></div>`).join('')}</div><button class="outline" onclick="addPhoto()">${icons.camera} Agregar foto</button>`}<div class="security">${icons.lock}<p>La foto se almacena de forma segura y solo es accesible por el equipo de Assetplan.</p></div></div>`;app.innerHTML=shell(body,{step:3,footer:footer('Continuar','go(4)',has)})}
    function addPhoto(){const i=state.photos.length;state.photos.push(`26/06/2026 — ${String(9+i).padStart(2,'0')}:${String(41+i).padStart(2,'0')}`);render()}function removePhoto(i){state.photos.splice(i,1);render()}
    const participation=[['present',icons.user,'Sí, quiero estar presente','Te coordinaremos un horario para la inspección'],['remote',icons.monitor,'Prefiero participar de forma remota','Te enviaremos un enlace para seguir la inspección a distancia'],['none',icons.clipboard,'No necesito participar','Agendaremos la inspección sin necesidad de tu presencia']];
    function render4(){const can=state.participation==='remote'||state.participation==='none'||(state.participation==='present'&&(!state.hasSlots||state.slot));const extra=`<div class="demo"><span>Demo:</span><button class="pill ${state.hasSlots?'active':''}" onclick="setAvailability(true)">Con disponibilidad</button><button class="pill warning ${!state.hasSlots?'active':''}" onclick="setAvailability(false)">Sin disponibilidad</button></div>`;const body=`<div class="content"><div class="question"><h2>¿Quieres participar en la inspección?</h2><p>La inspección evalúa el estado del departamento y las reparaciones necesarias.</p></div><div class="participation">${participation.map(([id,ic,t,s])=>`<div><button class="part-card ${state.participation===id?'selected':''}" onclick="chooseParticipation('${id}')"><span class="part-icon">${ic}</span><span class="part-copy"><b>${t}</b><small>${s}</small></span>${state.participation===id?`<span class="check-dot">✓</span>`:''}</button>${id==='present'&&state.participation==='present'&&state.hasSlots&&state.slot?`<div class="slot-confirmed"><span style="color:var(--blue)">✓</span><span>${state.slot}</span><button onclick="slotSheet()">Cambiar horario</button></div>`:''}</div>`).join('')}</div></div>`;app.innerHTML=shell(body,{step:4,extra,footer:footer('Confirmar agenda','confirmModal()',!!can)})}
    function setAvailability(v){state.hasSlots=v;state.slot='';render()}function chooseParticipation(id){state.participation=id;render();if(id==='present')state.hasSlots?slotSheet():noSlotsSheet()}
    function render5(){const rows=[['Propiedad','Jorge Washington 520, Depto 307, Ñuñoa'],['Arrendatario','Camila Torres'],['Elementos recibidos','Llaves del departamento, Control de acceso / tag'],['Participación',state.participation==='remote'?'Remota':state.participation==='none'?'Sin participación':`Presencial — ${state.slot||'por coordinar'}`],['Registro N°','#REG-2026-04821']];const body=`<div class="content" style="padding-top:32px;padding-bottom:150px"><div class="success"><div class="success-icon">${icons.check}</div><h2>¡Registro completado!</h2><p>Las llaves de Camila Torres han sido registradas correctamente.</p></div><div class="summary">${rows.map((r,i)=>`<div class="summary-row"><small>${r[0]}</small><span>${r[1]}</span>${i===3?'<span class="green-pill">Agendado</span>':''}</div>`).join('')}</div><div class="mail-note">${icons.mail}<p>Se enviará un comprobante a <b>camila.torres@gmail.com</b> con los detalles del registro y el horario de inspección.</p></div></div>`;app.innerHTML=shell(body,{footer:footer('Nuevo registro','restart()',true,'<button class="outline" onclick="restart()">Volver al inicio</button>')})}
    function restart(){Object.assign(state,{step:1,direction:'forward',search:false,query:'Jorge Washington 520',selected:1,delivered:'titular',counts:{depto:0,bodega:0,tarjeta:0,control:0},photos:[],participation:null,hasSlots:true,slot:'',pendingSlot:null});render()}
    function overlay(html){app.insertAdjacentHTML('beforeend',html)}function closeOverlay(){document.querySelectorAll('.backdrop,.sheet,.modal-wrap,.qr').forEach(x=>x.remove())}
    function manualSheet(){overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="sheet"><div class="handle"></div><div class="sheet-header"><div><h2>Ingresa el código manualmente</h2><p>Encuéntralo en el correo que recibió el arrendatario</p></div><button class="x-btn" onclick="closeOverlay()">×</button></div><div class="sheet-body"><label class="label">Código</label><input id="code" class="input" placeholder="Ej: 6688990" oninput="document.getElementById('codeConfirm').disabled=!this.value.trim()"><button id="codeConfirm" class="primary" disabled onclick="closeOverlay();go(2)">Confirmar código</button></div></div>`);setTimeout(()=>document.getElementById('code').focus(),30)}
    function openQR(){overlay(`<div class="qr" id="qr"><div class="qr-camera" onclick="scanQR()"><button class="qr-close" onclick="event.stopPropagation();closeOverlay()">×</button><span class="qr-hint">Toca para simular</span><div class="finder"><div class="scanline"></div><div class="scan-success"><div><i>✓</i>¡Código detectado!</div></div></div></div><div class="qr-bottom">${icons.qr}<p>Apunta la cámara al código del mail</p></div></div>`)}function scanQR(){document.getElementById('qr').classList.add('scanned');setTimeout(()=>{closeOverlay();go(2)},900)}
    const slotGroups=[['Martes 30 de junio',['09:00 – 10:00 hrs','11:00 – 12:00 hrs','15:00 – 16:00 hrs']],['Miércoles 1 de julio',['10:00 – 11:00 hrs','14:00 – 15:00 hrs']],['Jueves 2 de julio',['09:00 – 10:00 hrs','16:00 – 17:00 hrs']]];
    function slotSheet(){state.pendingSlot=null;overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="sheet"><div class="handle"></div><div class="sheet-header"><div><h2>Elige un horario para la inspección</h2><p>Selecciona el día y la hora que más te acomode</p></div></div><div class="sheet-body">${slotGroups.map(([d,slots])=>`<div class="slot-group"><h3>${d}</h3>${slots.map(t=>`<button class="slot" onclick="pickSlot(this,'${d}, ${t}')"><span>${t}</span><span></span></button>`).join('')}</div>`).join('')}</div><button id="slotConfirm" class="primary" disabled onclick="confirmSlot()">Confirmar horario</button></div>`)}function pickSlot(el,label){document.querySelectorAll('.slot').forEach(x=>{x.classList.remove('selected');x.lastElementChild.textContent=''});el.classList.add('selected');el.lastElementChild.textContent='✓';state.pendingSlot=label;document.getElementById('slotConfirm').disabled=false}function confirmSlot(){state.slot=state.pendingSlot;closeOverlay();render()}
    function noSlotsSheet(){overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="sheet"><div class="handle"></div><div class="amber"><div class="amber-icon">${icons.calendar}</div><h2>No hay horarios disponibles por ahora</h2><p>Estamos en período de alta demanda. Te contactaremos dentro de las próximas 24–48 hrs para coordinar el horario de tu inspección.</p><hr style="border:0;border-top:1px solid #fde68a;margin:12px 0"><small>Te avisaremos a <b>camila.torres@gmail.com</b></small></div><p class="secondary" style="text-align:center;margin-top:16px">Tu registro quedará guardado. No necesitas hacer nada más.</p><button class="primary" onclick="closeOverlay()">Entendido</button></div>`)}
    function confirmModal(){overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="modal-wrap"><div class="modal"><div class="modal-icon">${icons.check}</div><h2>¿Confirmar registro?</h2><p>Al confirmar, el registro quedará guardado y recibirás un comprobante por mail.</p><button class="primary" onclick="closeOverlay();go(5)">Confirmar</button><button class="outline" onclick="closeOverlay()">Cancelar</button></div></div>`)}
    function escapeHtml(v){return v.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    render();
  </script>
</body>
</html>
