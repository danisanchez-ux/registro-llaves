    function refreshNoTimeStepOne(){replaceNoTimeSubstep(noTimeStepOne(),noTimeStepOneFooter())}function refreshNoTimeStepTwo(){replaceNoTimeSubstep(noTimeStepTwo(),fixedActionFooter('Confirmar registro','confirmNoTimeReason()',!!state.noTimeReason))}
    function selectNoTimeParticipation(id){state.participation=id;state.noTimeReason=null;state.preferredDate='';state.preferredTime='';refreshNoTimeStepOne()}function showNoTimeReason(){state.p4View='no-time-2';state.noTimeReason=null;state.preferredDate='';state.preferredTime='';refreshNoTimeStepTwo()}function backToNoTimeParticipation(){state.p4View='no-time-1';state.noTimeReason=null;state.preferredDate='';state.preferredTime='';state.participation='present';refreshNoTimeStepOne()}function selectNoTimeReason(id){state.noTimeReason=id;if(id==='remote'){state.preferredDate='';state.preferredTime=''}refreshNoTimeStepTwo()}function confirmNoTimeReason(){state.participation=state.noTimeReason==='remote'?'remote':'present';confirmModal()}
    function setAvailability(v){state.hasSlots=v;state.slot='';state.chosenDay=null;state.chosenTime='';state.pendingDay=null;state.pendingSlot=null;state.noSuitable=false;state.noTimeReason=null;state.preferredDate='';state.preferredTime='';state.p4View=v?'intro':'no-availability';state.participation=null;render()}function chooseParticipation(id){state.participation=id;render()}function toggleParticipation(id){state.participation=state.participation===id?null:id;render()}function backToP4Intro(){state.p4View='intro';state.slot='';state.chosenDay=null;state.chosenTime='';state.pendingDay=null;state.pendingSlot=null;state.noSuitable=false;state.noTimeReason=null;state.preferredDate='';state.preferredTime='';state.participation=null;render()}function declineParticipation(){startNoTimeFlow()}
    function render5(){const scheduled=!!state.slot,hasPreference=!scheduled&&state.participation==='present'&&(state.preferredDate||state.preferredTime);const participationValue=scheduled?confirmedScheduleText():state.participation==='remote'?'Remota':state.participation==='none'?'No participará':'Presencial';const preference=hasPreference?`<div class="preference-summary"><small>Horario preferido por el arrendatario</small><strong>${preferredScheduleText()}</strong><p>Intentaremos agendar en ese horario. Le notificaremos la confirmación.</p></div>`:'';const participation=`<div class="summary-row participation-summary"><small>Participación</small><div class="participation-line"><span class="participation-value">${participationValue}</span><span class="status-pill ${scheduled?'scheduled':'pending'}">${scheduled?'Agendado':'Pendiente de agendar'}</span></div>${preference}</div>`;const mailCopy=scheduled?'Se enviará un comprobante a <b>camila.torres@gmail.com</b> con los detalles del registro y el horario de inspección.':'Se enviará un comprobante a <b>camila.torres@gmail.com</b> con los detalles del registro. Le avisaremos el horario de inspección una vez confirmado.';const body=`<div class="content" style="padding-top:32px;padding-bottom:150px"><div class="success"><div class="success-icon">${icons.check}</div><h2>¡Registro completado!</h2><p>Las llaves de Camila Torres han sido registradas correctamente.</p></div><div class="summary">${summaryRow('Propiedad','Jorge Washington 520, Depto 307, Ñuñoa')}${summaryRow('Arrendatario','Camila Torres')}${summaryRow('Elementos recibidos','Llaves del departamento, Control de acceso / tag')}${participation}${summaryRow('Registro N°','#REG-2026-04821')}</div><div class="mail-note">${icons.mail}<p>${mailCopy}</p></div></div>`;app.innerHTML=shell(body,{footer:fixedActionFooter('Nuevo registro','restart()',true)})}
    function summaryRow(label,value){return `<div class="summary-row"><small>${label}</small><span>${value}</span></div>`}
    function confirmedScheduleText(){const raw=state.chosenDay?.summary||'';const date=raw.replace(',','').replace(/(\d+)\s+([A-Za-zÁÉÍÓÚáéíóúñÑ]+)/,'$1 de $2');return `Presencial - ${date} ${state.chosenTime} hrs.`}
    function preferredScheduleText(){const parts=[];if(state.preferredDate)parts.push(formatPreferredDate(state.preferredDate));if(state.preferredTime)parts.push(`${state.preferredTime} hrs.`);return parts.join(', ')}
    function formatPreferredDate(value){const [year,month,day]=value.split('-').map(Number);const date=new Date(year,month-1,day);const weekdays=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return `${weekdays[date.getDay()]} ${day} de ${months[month-1]}`}
    function restart(){Object.assign(state,{step:1,direction:'forward',animateScreen:true,search:false,query:'',selected:null,deliveryDate:'2026-07-15',counterInteracted:false,counts:{depto:0,bodega:0,tarjeta:0,control:0},comments:'',photos:[],participation:null,hasSlots:true,slot:'',chosenDay:null,chosenTime:'',noSuitable:false,noTimeReason:null,preferredDate:'',preferredTime:'',p4View:'intro',pendingDay:null,pendingSlot:null});render()}
    function stabilizeScreen(){const screen=app.querySelector('.screen');if(screen){screen.classList.add('no-animate');screen.classList.remove('back')}}
    function overlay(html){stabilizeScreen();app.classList.add('overlay-open');app.insertAdjacentHTML('beforeend',html)}function closeOverlay(){stabilizeScreen();document.querySelectorAll('.backdrop,.sheet,.modal-wrap,.qr').forEach(x=>x.remove());app.classList.remove('overlay-open')}
    function manualSheet(){overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="sheet"><div class="handle"></div><div class="sheet-header"><div><h2>Ingresa el código manualmente</h2><p>Encuéntralo en el correo que recibió el arrendatario</p></div><button class="x-btn" onclick="closeOverlay()">×</button></div><div class="sheet-body"><label class="label">Código</label><input id="code" class="input" placeholder="Ej: 6688990" oninput="document.getElementById('codeConfirm').disabled=!this.value.trim()"><button id="codeConfirm" class="primary" disabled onclick="closeOverlay();go(2)">Confirmar código</button></div></div>`)}
    function openQR(){overlay(`<div class="qr" id="qr"><div class="qr-camera" onclick="scanQR()"><button class="qr-close" onclick="event.stopPropagation();closeOverlay()">×</button><span class="qr-hint">Toca para simular</span><div class="finder"><div class="scanline"></div><div class="scan-success"><div><i>✓</i>¡Código detectado!</div></div></div></div><div class="qr-bottom">${icons.qr}<p>Apunta la cámara al código del correo</p></div></div>`)}function scanQR(){document.getElementById('qr').classList.add('scanned');setTimeout(()=>{closeOverlay();go(2)},900)}
    function confirmModal(){overlay(`<div class="backdrop" onclick="closeOverlay()"></div><div class="modal-wrap"><div class="modal"><div class="modal-icon">${icons.check}</div><h2>¿Confirmar registro?</h2><p>El registro quedará guardado y le avisaremos al arrendatario el día y hora confirmados de la inspección.</p><div class="modal-actions"><button class="outline" onclick="closeOverlay()">Cancelar</button><button class="primary" onclick="closeOverlay();go(5)">Confirmar</button></div></div></div>`)}
    function escapeHtml(v){return v.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function syncAppHeight(){if(!app.classList.contains('overlay-open'))document.documentElement.style.setProperty('--app-height',window.innerHeight+'px')}
    syncAppHeight();window.addEventListener('resize',syncAppHeight);render();
  </script>
</body>
</html>
